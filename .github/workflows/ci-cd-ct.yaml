name: Build, Test, Publish and MLOps Pipeline

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
  # Critère temporel : Réentraînement automatique le 1er du mois à 2h00
  schedule:
    - cron: '0 2 1 * *'
  # Critère manuel : Bouton dans l'interface GitHub
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Forcer le réentraînement du modèle'
        required: true
        type: boolean
        default: true
  # Critère Data Drift : Webhook envoyé par Evidently ou autre outil de monitoring
  repository_dispatch:
    types: [data_drift_detected]


jobs:

  # ============================================================
  # JOB 1 — CI : Intégration Continue
  # Déclenché sur : PR, push main, schedule, dispatch, manual
  # ============================================================
  lint-format-and-static-code-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install

      - name: Lint, Format, and other static code quality checks
        run: make lint-ci

      - name: Run Tests
        run: make test-ci

  # ============================================================
  # JOB 2 — CT : Entraînement Continu (Continuous Training)
  # Déclenché sur : push main, schedule, dispatch, manual
  # PAS sur les PR (on ne réentraîne pas sur chaque PR)
  # ============================================================
  continuous-training:
    runs-on: ubuntu-latest
    needs: lint-format-and-static-code-checks
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install

      - name: Run Kedro pipeline (CT)
        run: make run-pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: data/api/
          retention-days: 30

  # ============================================================
  # JOB 3 — CD : Déploiement Continu (Continuous Deployment)
  # Déclenché uniquement après un CT réussi
  # ============================================================
  continuous-deployment:
    runs-on: ubuntu-latest
    needs: continuous-training
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: data/api/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Render (webhook)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK non configuré, déploiement Render ignoré."
          fi
